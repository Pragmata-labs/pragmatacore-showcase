[LandingGear]
; Animation index in the GLB — forward=retract (Takeoff), reverse=deploy (Landed)
animIndex = 0

[RearDoor]
; Animation index in the GLB — forward=open (Landed), reverse=close (Takeoff)
animIndex = 1

[Thrusters]
; Local rotation axis for all 4 thruster bones
rotAxisX = 0.0
rotAxisY = 0.0
rotAxisZ = 1.0
; Rotation speed toward target angle (degrees per second)
speedDeg = 30.0
; Target base angle per ship state (degrees)
angleLanded      = 0.0
angleTakeoff     = 0.0
angleFlight      = 90.0
; When returning from Flight → VTOL, thrusters sweep to this angle first (reverse thrust),
; then ease back to 0° before hover noise kicks in
angleReturnVTOL  = 0.0
; Per-motor sign multiplier — use 1 or -1 to mirror rotation for each bone.
; Order: Engine_Front_Left, Engine_Front_Right, Engine_Rear_Left, Engine_Rear_Right
signFrontLeft  = -1
signFrontRight = -1
signRearLeft   = -1
signRearRight  = -1
; Hover noise — active during Takeoff and Flight
; noiseAmplitude: peak swing in degrees (added on top of base angle)
noiseAmplitude = 1.5
; Two sine waves mixed together for organic feel
noiseFreq1 = 1.3
noiseFreq2 = 2.7

[VTOL]
; Seconds to wait after entering VTOL before hover noise and wave activate
hoverStartDelay = 1.0
; Seconds to wait for door to close before retracting gear (takeoff sequence)
doorCloseDelay = 2.5
; Seconds to wait after Landed signal before leveling boat and stopping thrusters
; Should match landing gear animation duration (see LandingGear animIndex)
landingDelay = 2.5

[Lights]
; Enable/disable point lights entirely (1=on, 0=off)
enabled = 0
; Point light intensity per state (lux)
intensityLanded  = 15000.0
intensityTakeoff = 20000.0
intensityFlight  = 50000.0
; Fade speed between intensity states (lux/sec)
fadeSpeed = 20000.0
; Light color (RGB 0..1)  #1E6DFF
colorR = 1.0
colorG = 0.0
colorB = 0.0
; Falloff radius (metres)
falloff = 4.0
