; System configuration — render quality, platform tweaks
; Vrijednosti se primjenjuju pri pokretanju app-a.

[iPad]
; Zoom offset pri učitavanju modela (pozitivno = dalje od modela)
defaultZoomOffset = 0.5

[Render]
bloom = 1
bloomStrength = 0.35
shadowsEnabled = 1
ambientOcclusion = 1.5
vignette = 0
ssr = 0

[AntiAliasing]
; Tip: none, fxaa, msaa
type = msaa
msaaSamples = 2

[DynamicResolution]
enabled = 1
