[CarPaint]
; Boja lakera (sRGB 0.0-1.0)
baseColorR = 0.623
baseColorG = 0.427
baseColorB = 0.035

; Površinska svojstva base sloja
roughness = 0.65
reflectance = 0.2
; Metallic — driven iz roughness teksture (flakes)
; 0.0 = crno u teksturi (mat guma), 0.9 = bijelo (metalik flake)
metallicMin = 0.9
metallicMax = 1.0

; Clear coat — driven iz roughness teksture (inverted)
; bijelo u teksturi = slabiji lak, crno = jači lak
clearCoatMin = 0.35
clearCoatMax = 0.95
clearCoatRoughnessMin = 0.05
clearCoatRoughnessMax = 0.15

; Normal mapa (metal flakes)
normalIntensity = 0.12
uvScale = 8.0
uvScaleRoughness = 1.0