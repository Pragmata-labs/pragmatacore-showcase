name: PragmataCoreShowcase
options:
  bundleIdPrefix: com.pragmatacore.showcase
  deploymentTarget:
    iOS: 17.0
    tvOS: 17.0
    macOS: 15.0
  xcodeVersion: 14.0
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

packages:
  PragmataCore:
    url: https://github.com/Pragmata-labs/pragmatacore-showcase
    from: 0.1.1

schemes:
  Showcase-iPadOS:
    build:
      targets:
        PragmataCoreShowcase: all
    run:
      config: Debug
    archive:
      config: Release

  Showcase-tvOS:
    build:
      targets:
        PragmataCoreShowcase-tvOS: all
    run:
      config: Debug
    archive:
      config: Release

  Showcase-macOS:
    build:
      targets:
        PragmataCoreShowcase-macOS: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  PragmataCoreShowcase:
    type: application
    platform: iOS
    sources:
      - path: Sources/Shared
        excludes:
          - "**/*.a"
          - "Vendor/lib/tvos-arm64/**"
          - "Resources/Materials/**"
          - "Resources/SandFloor/**"
          - "Resources/xRayMaterial/**"
          - "Resources/WaterMaterial/**"
          - "ControlsINI/**"
          - "Core/ConfiguratorKitCore.cpp"
      - path: Sources/Shared/ControlsINI
        type: folder
      - path: Sources/Shared/Resources/Materials
        type: folder
      - path: Sources/Shared/Resources/SandFloor
        type: folder
      - path: Sources/Shared/Resources/xRayMaterial
        type: folder
      - path: Sources/Shared/Resources/WaterMaterial
        type: folder
      - path: Sources/Shared/PrivacyInfo.xcprivacy
      - path: Sources/Shared/Logging
        name: Logging
      - path: Sources/iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pragmatacore.showcase.ios
        PRODUCT_NAME: "PragmataCore Configurator"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Sources/iOS/App/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Shared/Core/PragmataCoreDemo-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Sources/Shared/Core"
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        ENABLE_BITCODE: NO
        DEAD_CODE_STRIPPING: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
      configs:
        Release:
          GCC_PREPROCESSOR_DEFINITIONS: ["$(inherited)", "PRAGMATACORE_DISABLE_LOGGING=1"]
    dependencies:
      - package: PragmataCore
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: UIKit.framework

  PragmataCoreShowcase-tvOS:
    type: application
    platform: tvOS
    sources:
      - path: Sources/Shared
        excludes:
          - "**/*.storyboard"
          - "**/*.a"
          - "Resources/Materials/**"
          - "Resources/SandFloor/**"
          - "Resources/xRayMaterial/**"
          - "Resources/WaterMaterial/**"
          - "ControlsINI/**"
          - "Core/ConfiguratorKitCore.cpp"
      - path: Sources/Shared/ControlsINI
        type: folder
      - path: Sources/Shared/Resources/Materials
        type: folder
      - path: Sources/Shared/Resources/SandFloor
        type: folder
      - path: Sources/Shared/Resources/xRayMaterial
        type: folder
      - path: Sources/Shared/Resources/WaterMaterial
        type: folder
      - path: Sources/Shared/PrivacyInfo.xcprivacy
      - path: Sources/Shared/Logging
        name: Logging
      - path: Sources/tvOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pragmatacore.showcase.tv
        PRODUCT_NAME: "PragmataCore Configurator"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Sources/tvOS/App/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Shared/Core/PragmataCoreDemo-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Sources/Shared/Core"
        EXCLUDED_ARCHS[sdk=appletvsimulator*]: "arm64 x86_64"
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        ASSETCATALOG_COMPILER_APPICON_NAME: "tvOS"
        ENABLE_BITCODE: NO
        DEAD_CODE_STRIPPING: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
      configs:
        Release:
          GCC_PREPROCESSOR_DEFINITIONS: ["$(inherited)", "PRAGMATACORE_DISABLE_LOGGING=1"]
    dependencies:
      - package: PragmataCore
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: UIKit.framework
      - sdk: GameController.framework

  PragmataCoreShowcase-macOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/Shared
        excludes:
          - "**/*.a"
          - "Vendor/lib/tvos-arm64/**"
          - "Vendor/lib/arm64/**"
          - "Vendor/lib/ios-arm64/**"
          - "Resources/Materials/**"
          - "Resources/SandFloor/**"
          - "Resources/xRayMaterial/**"
          - "Resources/WaterMaterial/**"
          - "ControlsINI/**"
          - "Core/PragmataView.h"
          - "Core/PragmataView.mm"
          - "Core/ConfiguratorKitCore.cpp"
      - path: Sources/Shared/ControlsINI
        type: folder
      - path: Sources/Shared/Resources/Materials
        type: folder
      - path: Sources/Shared/Resources/SandFloor
        type: folder
      - path: Sources/Shared/Resources/xRayMaterial
        type: folder
      - path: Sources/Shared/Resources/WaterMaterial
        type: folder
      - path: Sources/Shared/Resources/MaterialsDesktop
        type: folder
      - path: Sources/Shared/PrivacyInfo.xcprivacy
      - path: Sources/Shared/Logging
        name: Logging
      - path: Sources/macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pragmatacore.showcase.mac
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        INFOPLIST_FILE: Sources/macOS/App/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Shared/Core/PragmataCoreDemo-Bridging-Header.h
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Sources/Shared/Core"
          - "$(SRCROOT)/Sources/macOS/UI"
        PRODUCT_NAME: "PragmataCore Configurator"
        ARCHS: arm64
        ASSETCATALOG_COMPILER_APPICON_NAME: "macOS/macOSicon"
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        ENABLE_BITCODE: NO
        DEAD_CODE_STRIPPING: YES
      configs:
        Release:
          GCC_PREPROCESSOR_DEFINITIONS: ["$(inherited)", "PRAGMATACORE_DISABLE_LOGGING=1"]
    dependencies:
      - package: PragmataCore
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: AppKit.framework
